name: Update daily brief

on:
  workflow_dispatch:
  schedule:
    # 00:07 UTC = 08:07 Beijing time (UTC+8).
    - cron: "7 0 * * *"

permissions:
  contents: write

concurrency:
  group: daily-brief-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build latest brief
        run: python scripts/build_brief.py
      - name: Commit refreshed data
        run: |
          if git diff --quiet -- data/brief.json; then
            echo "No brief changes to commit."
            exit 0
          fi
          git config user.name "daily-brief-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/brief.json
          git commit -m "Update daily brief"
          git push
